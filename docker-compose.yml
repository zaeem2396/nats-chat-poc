# nats-chat-poc: Laravel app + NATS (JetStream) + MySQL + queue worker
# Run: docker compose up -d && docker compose exec app php artisan migrate --force

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nats-chat-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./storage:/var/www/storage
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=nats_chat
      - DB_USERNAME=nats_chat
      - DB_PASSWORD=secret
      - NATS_HOST=nats
      - NATS_PORT=4222
      - QUEUE_CONNECTION=nats
      - NATS_QUEUE_DELAYED_ENABLED=true
      - NATS_ANALYTICS_HOST=nats
    depends_on:
      mysql:
        condition: service_healthy
      nats:
        condition: service_started
    ports:
      - "8000:8000"
    command: php artisan serve --host=0.0.0.0 --port=8000

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nats-chat-queue
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    environment:
      - APP_ENV=local
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_DATABASE=nats_chat
      - DB_USERNAME=nats_chat
      - DB_PASSWORD=secret
      - NATS_HOST=nats
      - NATS_PORT=4222
      - QUEUE_CONNECTION=nats
      - NATS_QUEUE_DELAYED_ENABLED=true
    depends_on:
      - app
      - nats
    command: php artisan queue:work nats --tries=3 --sleep=1

  mysql:
    image: mysql:8.0
    container_name: nats-chat-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: nats_chat
      MYSQL_USER: nats_chat
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  nats:
    image: nats:2.10-alpine
    container_name: nats-chat-nats
    restart: unless-stopped
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"

volumes:
  mysql_data:
