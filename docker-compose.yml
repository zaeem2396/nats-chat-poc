# Distributed order pipeline PoC: Laravel + NATS JetStream + MySQL
# Ports: app 8090, MySQL ${MYSQL_HOST_PORT:-3307}, NATS 4223/8224, phpMyAdmin 8091
#
# Setup:
#   docker compose up -d
#   docker compose exec app php artisan migrate --force
#   docker compose exec app php artisan nats:orders:provision-stream
#
# Workers (each is a durable JetStream pull consumer with explicit ACK/NACK):
#   orders-worker, payments-worker, inventory-worker, notifications-worker

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nats-orders-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./storage:/var/www/storage
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=http://localhost:${APP_HOST_PORT:-8090}
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=nats_chat
      - DB_USERNAME=nats_chat
      - DB_PASSWORD=secret
      - NATS_HOST=nats
      - NATS_PORT=4222
      - QUEUE_CONNECTION=sync
    depends_on:
      mysql:
        condition: service_healthy
      nats:
        condition: service_started
    ports:
      - "${APP_HOST_PORT:-8090}:8000"
    healthcheck:
      test: ["CMD", "php", "-r", "$$s=@fsockopen('127.0.0.1',8000);if($$s){fclose($$s);exit(0);}exit(1);"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    command: php artisan serve --host=0.0.0.0 --port=8000

  orders-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nats-orders-worker
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    environment:
      - APP_ENV=local
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_DATABASE=nats_chat
      - DB_USERNAME=nats_chat
      - DB_PASSWORD=secret
      - NATS_HOST=nats
      - NATS_PORT=4222
      - QUEUE_CONNECTION=sync
    depends_on:
      - app
      - nats
    command: php artisan nats:orders-worker

  payments-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nats-payments-worker
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    environment:
      - APP_ENV=local
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_DATABASE=nats_chat
      - DB_USERNAME=nats_chat
      - DB_PASSWORD=secret
      - NATS_HOST=nats
      - NATS_PORT=4222
      - QUEUE_CONNECTION=sync
    depends_on:
      - app
      - nats
    command: php artisan nats:payments-worker

  inventory-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nats-inventory-worker
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    environment:
      - APP_ENV=local
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_DATABASE=nats_chat
      - DB_USERNAME=nats_chat
      - DB_PASSWORD=secret
      - NATS_HOST=nats
      - NATS_PORT=4222
      - QUEUE_CONNECTION=sync
    depends_on:
      - app
      - nats
    command: php artisan nats:inventory-worker

  notifications-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nats-notifications-worker
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    environment:
      - APP_ENV=local
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_DATABASE=nats_chat
      - DB_USERNAME=nats_chat
      - DB_PASSWORD=secret
      - NATS_HOST=nats
      - NATS_PORT=4222
      - QUEUE_CONNECTION=sync
    depends_on:
      - app
      - nats
    command: php artisan nats:notifications-worker

  mysql:
    image: mysql:8.0
    container_name: nats-orders-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: nats_chat
      MYSQL_USER: nats_chat
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: nats-orders-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: nats_chat
      PMA_PASSWORD: secret
      UPLOAD_LIMIT: 64M
    ports:
      - "8091:80"
    depends_on:
      mysql:
        condition: service_healthy

  nats:
    image: nats:2.10-alpine
    container_name: nats-orders-nats
    restart: unless-stopped
    command: ["-js", "-m", "8222"]
    ports:
      - "${NATS_HOST_CLIENT_PORT:-4223}:4222"
      - "${NATS_HOST_MONITOR_PORT:-8224}:8222"

volumes:
  mysql_data:
