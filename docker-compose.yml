# nats-chat-poc: Laravel app + NATS (JetStream) + MySQL + phpMyAdmin + workers
# Ports chosen to avoid clashes with other projects: app 8090, MySQL 3307, NATS 4223/8224, phpMyAdmin 8091
# Run: docker compose up -d && docker compose exec app php artisan migrate --force

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nats-chat-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./storage:/var/www/storage
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=http://localhost:8090
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=nats_chat
      - DB_USERNAME=nats_chat
      - DB_PASSWORD=secret
      - NATS_HOST=nats
      - NATS_PORT=4222
      - QUEUE_CONNECTION=nats
      - NATS_QUEUE_DELAYED_ENABLED=true
      - NATS_ANALYTICS_HOST=nats
    depends_on:
      mysql:
        condition: service_healthy
      nats:
        condition: service_started
    ports:
      - "8090:8000"
    healthcheck:
      test: ["CMD", "php", "-r", "$s=@fsockopen('127.0.0.1',8000);if($s){fclose($s);exit(0);}exit(1);"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    command: php artisan serve --host=0.0.0.0 --port=8000

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nats-chat-queue
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    environment:
      - APP_ENV=local
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_DATABASE=nats_chat
      - DB_USERNAME=nats_chat
      - DB_PASSWORD=secret
      - NATS_HOST=nats
      - NATS_PORT=4222
      - QUEUE_CONNECTION=nats
      - NATS_QUEUE_DELAYED_ENABLED=true
    depends_on:
      - app
      - nats
    command: php artisan nats:work --tries=3 --sleep=1

  moderation:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nats-chat-moderation
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    environment:
      - APP_ENV=local
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_DATABASE=nats_chat
      - DB_USERNAME=nats_chat
      - DB_PASSWORD=secret
      - NATS_HOST=nats
      - NATS_PORT=4222
      - QUEUE_CONNECTION=nats
    depends_on:
      - app
      - nats
    command: php artisan nats:consume "chat.room.*.message" --handler=App\\Handlers\\ModerationMessageHandler

  rpc-responder:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nats-chat-rpc
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    environment:
      - APP_ENV=local
      - NATS_HOST=nats
      - NATS_PORT=4222
    depends_on:
      - app
      - nats
    command: php artisan nats:consume "user.rpc.preferences" --handler=App\\Handlers\\UserPreferencesRpcHandler

  analytics:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nats-chat-analytics
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    environment:
      - APP_ENV=local
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_DATABASE=nats_chat
      - DB_USERNAME=nats_chat
      - DB_PASSWORD=secret
      - NATS_HOST=nats
      - NATS_ANALYTICS_HOST=nats
      - NATS_PORT=4222
      - QUEUE_CONNECTION=nats
    depends_on:
      - app
      - nats
    command: php artisan nats-chat:analytics-worker --connection=analytics

  mysql:
    image: mysql:8.0
    container_name: nats-chat-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: nats_chat
      MYSQL_USER: nats_chat
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: nats-chat-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: nats_chat
      PMA_PASSWORD: secret
      UPLOAD_LIMIT: 64M
    ports:
      - "8091:80"
    depends_on:
      mysql:
        condition: service_healthy

  nats:
    image: nats:2.10-alpine
    container_name: nats-chat-nats
    restart: unless-stopped
    command: ["-js", "-m", "8222"]
    ports:
      - "4223:4222"
      - "8224:8222"

volumes:
  mysql_data:
